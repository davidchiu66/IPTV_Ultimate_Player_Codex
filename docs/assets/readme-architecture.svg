<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Playback architecture</title>
  <desc id="desc">Architecture diagram for resource loading, resolving, playback, browser fallback and diagnostics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#172033" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#69B2FF"/>
      <stop offset="1" stop-color="#A5D8FF"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#7CC0FF"/>
    </marker>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.35 0 0 0 0 0.68 0 0 0 0 1 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <text x="600" y="56" text-anchor="middle" fill="#E8F2FF" font-family="Segoe UI, Arial" font-size="30" font-weight="700">Playback and Resolving Pipeline</text>
  <text x="600" y="88" text-anchor="middle" fill="#9FB9D8" font-family="Segoe UI, Arial" font-size="15">Resource library, browser probe, libmpv playback and diagnostics work as one chain.</text>

  <g font-family="Segoe UI, Arial">
    <rect x="62" y="150" width="190" height="92" rx="18" fill="url(#box)" stroke="#78B4FF" stroke-opacity="0.45"/>
    <text x="157" y="185" text-anchor="middle" fill="#E8F2FF" font-size="18" font-weight="700">Resources</text>
    <text x="157" y="214" text-anchor="middle" fill="#BBD7F5" font-size="13">M3U / local media</text>

    <rect x="322" y="150" width="190" height="92" rx="18" fill="url(#box)" stroke="#78B4FF" stroke-opacity="0.45"/>
    <text x="417" y="185" text-anchor="middle" fill="#E8F2FF" font-size="18" font-weight="700">Resolver</text>
    <text x="417" y="214" text-anchor="middle" fill="#BBD7F5" font-size="13">direct / headers / type</text>

    <rect x="582" y="150" width="190" height="92" rx="18" fill="url(#box)" stroke="#78B4FF" stroke-opacity="0.45"/>
    <text x="677" y="185" text-anchor="middle" fill="#E8F2FF" font-size="18" font-weight="700">Browser Probe</text>
    <text x="677" y="214" text-anchor="middle" fill="#BBD7F5" font-size="13">JS pages / real URL</text>

    <rect x="842" y="150" width="190" height="92" rx="18" fill="url(#box)" stroke="#78B4FF" stroke-opacity="0.45"/>
    <text x="937" y="185" text-anchor="middle" fill="#E8F2FF" font-size="18" font-weight="700">libmpv</text>
    <text x="937" y="214" text-anchor="middle" fill="#BBD7F5" font-size="13">decode / render / tracks</text>

    <rect x="842" y="316" width="190" height="92" rx="18" fill="url(#box)" stroke="#78B4FF" stroke-opacity="0.45"/>
    <text x="937" y="351" text-anchor="middle" fill="#E8F2FF" font-size="18" font-weight="700">Player UI</text>
    <text x="937" y="380" text-anchor="middle" fill="#BBD7F5" font-size="13">controls / panels / clock</text>

    <rect x="582" y="316" width="190" height="92" rx="18" fill="url(#box)" stroke="#78B4FF" stroke-opacity="0.45"/>
    <text x="677" y="351" text-anchor="middle" fill="#E8F2FF" font-size="18" font-weight="700">Diagnostics</text>
    <text x="677" y="380" text-anchor="middle" fill="#BBD7F5" font-size="13">logs / failure reasons</text>

    <rect x="322" y="316" width="190" height="92" rx="18" fill="url(#box)" stroke="#78B4FF" stroke-opacity="0.45"/>
    <text x="417" y="351" text-anchor="middle" fill="#E8F2FF" font-size="18" font-weight="700">Favorites</text>
    <text x="417" y="380" text-anchor="middle" fill="#BBD7F5" font-size="13">channels / media</text>

    <rect x="62" y="316" width="190" height="92" rx="18" fill="url(#box)" stroke="#78B4FF" stroke-opacity="0.45"/>
    <text x="157" y="351" text-anchor="middle" fill="#E8F2FF" font-size="18" font-weight="700">Playlists</text>
    <text x="157" y="380" text-anchor="middle" fill="#BBD7F5" font-size="13">albums / autoplay</text>

    <path d="M252 196H318" stroke="#7CC0FF" stroke-width="3" marker-end="url(#arrow)" filter="url(#glow)"/>
    <path d="M512 196H578" stroke="#7CC0FF" stroke-width="3" marker-end="url(#arrow)" filter="url(#glow)"/>
    <path d="M772 196H838" stroke="#7CC0FF" stroke-width="3" marker-end="url(#arrow)" filter="url(#glow)"/>
    <path d="M937 242V312" stroke="#7CC0FF" stroke-width="3" marker-end="url(#arrow)" filter="url(#glow)"/>
    <path d="M842 362H776" stroke="#7CC0FF" stroke-width="3" marker-end="url(#arrow)" filter="url(#glow)"/>
    <path d="M582 362H516" stroke="#7CC0FF" stroke-width="3" marker-end="url(#arrow)" filter="url(#glow)"/>
    <path d="M322 362H256" stroke="#7CC0FF" stroke-width="3" marker-end="url(#arrow)" filter="url(#glow)"/>

    <rect x="1056" y="182" width="86" height="194" rx="20" fill="#0B1220" stroke="#78B4FF" stroke-opacity="0.35"/>
    <text x="1099" y="224" text-anchor="middle" fill="#E8F2FF" font-size="14" font-weight="700">Browser</text>
    <text x="1099" y="248" text-anchor="middle" fill="#BBD7F5" font-size="11">fallback</text>
    <text x="1099" y="302" text-anchor="middle" fill="#E8F2FF" font-size="14" font-weight="700">Proxy</text>
    <text x="1099" y="326" text-anchor="middle" fill="#BBD7F5" font-size="11">headers</text>
    <path d="M1032 196H1052" stroke="#7CC0FF" stroke-width="3" marker-end="url(#arrow)" filter="url(#glow)"/>
    <path d="M1056 335H1036" stroke="#7CC0FF" stroke-width="3" marker-end="url(#arrow)" filter="url(#glow)"/>
  </g>
</svg>
