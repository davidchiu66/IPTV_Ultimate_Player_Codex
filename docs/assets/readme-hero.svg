<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">IPTV Ultimate Player preview</title>
  <desc id="desc">A dark glassmorphism desktop player preview with resource panels and playback controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.46" stop-color="#172033"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A4456" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#1A2333" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#69B2FF"/>
      <stop offset="1" stop-color="#9BD7FF"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.35 0 0 0 0 0.68 0 0 0 0 1 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <pattern id="brushed" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="transparent"/>
      <path d="M0 2H10 M0 7H10" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="34" fill="url(#brushed)"/>
  <circle cx="190" cy="100" r="150" fill="#2563EB" opacity="0.18"/>
  <circle cx="1000" cy="440" r="190" fill="#06B6D4" opacity="0.12"/>

  <g transform="translate(70 58)" filter="url(#shadow)">
    <rect width="1060" height="404" rx="28" fill="#050912" stroke="#78B4FF" stroke-opacity="0.36"/>
    <rect x="18" y="18" width="1024" height="48" rx="18" fill="url(#panel)" stroke="#78B4FF" stroke-opacity="0.28"/>
    <text x="530" y="49" text-anchor="middle" fill="#E8F2FF" font-family="Segoe UI, Arial" font-size="18" font-weight="600">IPTV Ultimate Player</text>
    <rect x="36" y="32" width="26" height="3" rx="2" fill="#CFE7FF"/>
    <rect x="36" y="42" width="26" height="3" rx="2" fill="#CFE7FF"/>
    <rect x="36" y="52" width="26" height="3" rx="2" fill="#CFE7FF"/>
    <circle cx="1002" cy="42" r="14" fill="none" stroke="#CFE7FF" stroke-width="2"/>
    <path d="M998 42h8M1002 38v8" stroke="#CFE7FF" stroke-width="2" stroke-linecap="round"/>

    <rect x="28" y="88" width="250" height="250" rx="22" fill="url(#panel)" stroke="#78B4FF" stroke-opacity="0.26"/>
    <text x="52" y="126" fill="#E8F2FF" font-family="Segoe UI, Arial" font-size="18" font-weight="600">Resource Library</text>
    <rect x="52" y="148" width="86" height="28" rx="14" fill="#69B2FF" opacity="0.28"/>
    <rect x="148" y="148" width="74" height="28" rx="14" fill="#FFFFFF" opacity="0.08"/>
    <rect x="52" y="196" width="188" height="12" rx="6" fill="#DCEBFF" opacity="0.72"/>
    <rect x="52" y="230" width="162" height="12" rx="6" fill="#DCEBFF" opacity="0.44"/>
    <rect x="52" y="264" width="198" height="12" rx="6" fill="#DCEBFF" opacity="0.58"/>
    <rect x="52" y="298" width="142" height="12" rx="6" fill="#DCEBFF" opacity="0.34"/>

    <rect x="302" y="88" width="456" height="250" rx="22" fill="#070B14" stroke="#78B4FF" stroke-opacity="0.18"/>
    <path d="M484 169L604 238L484 307Z" fill="#F8FBFF" opacity="0.96" filter="url(#softGlow)"/>
    <text x="530" y="126" text-anchor="middle" fill="#CFE7FF" font-family="Segoe UI, Arial" font-size="15">HLS  DASH  MPD  Local Media</text>

    <rect x="782" y="88" width="250" height="250" rx="22" fill="url(#panel)" stroke="#78B4FF" stroke-opacity="0.26"/>
    <text x="806" y="126" fill="#E8F2FF" font-family="Segoe UI, Arial" font-size="18" font-weight="600">Playlist</text>
    <rect x="806" y="158" width="168" height="14" rx="7" fill="#DCEBFF" opacity="0.65"/>
    <rect x="806" y="192" width="132" height="14" rx="7" fill="#DCEBFF" opacity="0.42"/>
    <rect x="806" y="226" width="182" height="14" rx="7" fill="#DCEBFF" opacity="0.58"/>
    <rect x="806" y="260" width="152" height="14" rx="7" fill="#DCEBFF" opacity="0.36"/>
    <rect x="806" y="294" width="112" height="14" rx="7" fill="#DCEBFF" opacity="0.3"/>

    <rect x="210" y="350" width="640" height="78" rx="24" fill="url(#panel)" stroke="#78B4FF" stroke-opacity="0.55" filter="url(#softGlow)"/>
    <text x="246" y="382" fill="#CFE7FF" font-family="Segoe UI, Arial" font-size="13">00:37</text>
    <rect x="296" y="375" width="362" height="5" rx="3" fill="#101318"/>
    <rect x="296" y="375" width="188" height="5" rx="3" fill="url(#blue)"/>
    <circle cx="484" cy="377.5" r="8" fill="#D8ECFF" filter="url(#softGlow)"/>
    <text x="676" y="382" fill="#CFE7FF" font-family="Segoe UI, Arial" font-size="13">01:04</text>
    <circle cx="530" cy="406" r="24" fill="#12233A" stroke="#78B8FF" stroke-width="2.5" filter="url(#softGlow)"/>
    <path d="M523 393L545 406L523 419Z" fill="#FFFFFF"/>
    <path d="M425 405h-24M659 405h24" stroke="#CFE7FF" stroke-width="4" stroke-linecap="round"/>
    <text x="762" y="411" fill="#E8F2FF" font-family="Segoe UI, Arial" font-size="15" font-weight="600">1.0x</text>
  </g>
</svg>
