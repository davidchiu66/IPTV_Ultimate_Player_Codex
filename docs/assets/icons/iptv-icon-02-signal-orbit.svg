<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">IPTV Ultimate Player icon concept 02 - Signal Orbit</title>
  <desc id="desc">A neon signal orbit icon with a central media play symbol.</desc>
  <defs>
    <radialGradient id="radial" cx="43%" cy="35%" r="72%">
      <stop offset="0" stop-color="#244c73"/>
      <stop offset="0.45" stop-color="#101a2d"/>
      <stop offset="1" stop-color="#05070e"/>
    </radialGradient>
    <linearGradient id="ring" x1="40" y1="40" x2="218" y2="215" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8bf2ff"/>
      <stop offset="0.5" stop-color="#6fb7ff"/>
      <stop offset="1" stop-color="#b49cff"/>
    </linearGradient>
    <linearGradient id="core" x1="94" y1="74" x2="164" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eaffff"/>
      <stop offset="1" stop-color="#72b9ff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <filter id="neon" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.3 0 0 0 0 0.78 0 0 0 0 1 0 0 0 0.82 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="24" y="24" width="208" height="208" rx="52" fill="url(#radial)"/>
    <rect x="25" y="25" width="206" height="206" rx="51" fill="none" stroke="#8cc9ff" stroke-opacity="0.5" stroke-width="2"/>
    <path d="M45 133C65 73 125 42 188 58" fill="none" stroke="url(#ring)" stroke-width="7" stroke-linecap="round" opacity="0.9" filter="url(#neon)"/>
    <path d="M211 122C189 183 129 215 66 197" fill="none" stroke="url(#ring)" stroke-width="7" stroke-linecap="round" opacity="0.78" filter="url(#neon)"/>
    <path d="M59 96C78 66 110 50 146 51" fill="none" stroke="#ddf6ff" stroke-opacity="0.55" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M198 158C178 190 144 206 106 203" fill="none" stroke="#ddf6ff" stroke-opacity="0.4" stroke-width="3.2" stroke-linecap="round"/>
    <circle cx="128" cy="128" r="56" fill="#08111e" stroke="#75bdff" stroke-width="4" filter="url(#neon)"/>
    <circle cx="128" cy="128" r="44" fill="#102136" stroke="#ffffff" stroke-opacity="0.12"/>
    <path d="M114 99L160 128L114 157Z" fill="url(#core)" filter="url(#neon)"/>
    <circle cx="191" cy="59" r="10" fill="#e9fbff" filter="url(#neon)"/>
    <circle cx="62" cy="197" r="9" fill="#9de4ff" filter="url(#neon)"/>
    <path d="M89 84C100 72 113 65 128 65M77 72C92 55 109 46 130 45" fill="none" stroke="#9be7ff" stroke-width="5" stroke-linecap="round" opacity="0.86"/>
    <path d="M167 172C156 184 143 191 128 191M179 184C164 201 147 210 126 211" fill="none" stroke="#b9a9ff" stroke-width="5" stroke-linecap="round" opacity="0.72"/>
  </g>
</svg>
